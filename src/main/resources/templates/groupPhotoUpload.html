<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>集合写真アップロード | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5">
        <h1 class="text-2xl font-black db-brown">集合写真アップロード</h1>
        <p class="mt-1 text-sm text-gray-500">トップページの固定画像を差し替えます</p>
    </div>

    <div class="mb-5 overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-100">
        <img src="/uploads/images/group-photo.jpg"
             onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
             alt="現在の集合写真"
             class="h-64 w-full object-cover">

        <div class="px-4 py-3 text-sm text-gray-500">
            現在表示されている画像
        </div>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">

        <div th:if="${successMessage}" class="mb-4 rounded-xl bg-green-50 p-3 text-sm font-bold text-green-700">
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${errorMessage}" class="mb-4 rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/admin/upload/group-photo}"
              method="post"
              enctype="multipart/form-data"
              class="space-y-5">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">画像ファイル</label>
                <input type="file"
                       name="file"
                       accept=".jpg,.jpeg"
                       required
                       class="w-full rounded-xl border px-4 py-3 text-sm">
                <p class="mt-2 text-xs leading-6 text-gray-500">
                    JPG/JPEGのみ対応。最大5MBまで。
                </p>
            </div>

            <button type="submit"
                    class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                アップロードする
            </button>
        </form>
    </div>

</section>
</body>
</html>
