<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>管理者コード変更 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5">
        <h1 class="text-2xl font-black db-brown">管理者コード変更</h1>
        <p class="mt-1 text-sm text-gray-500">管理者ログイン用コードを変更します</p>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">

        <div th:if="${successMessage}" class="mb-4 rounded-xl bg-green-50 p-3 text-sm font-bold text-green-700">
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${errorMessage}" class="mb-4 rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/admin/code}"
              method="post"
              class="space-y-5">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">現在のコード</label>
                <input type="password"
                       name="currentCode"
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">新しいコード</label>
                <input type="password"
                       name="newCode"
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <button type="submit"
                    class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                変更する
            </button>
        </form>
    </div>

</section>
</body>
</html>
