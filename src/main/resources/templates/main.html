<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>DazBones</title>
</head>

<body>
<section>

    <!-- ファーストビュー -->
    <div class="relative h-[390px] overflow-hidden bg-gray-200">
        <img src="/uploads/images/group-photo.jpg"
             onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
             alt="DazBones 集合写真"
             class="h-full w-full object-cover">

        <div class="absolute inset-0 bg-gradient-to-t from-black/65 via-black/15 to-transparent"></div>

        <div class="absolute bottom-8 left-5 right-5 text-white">
            <p class="db-hero-shadow text-2xl font-black">草野球チーム</p>
            <h1 class="db-hero-shadow mt-1 text-5xl font-black italic">DazBones</h1>
            <p class="db-hero-shadow mt-3 text-base font-bold">楽しく、熱く、全力で。</p>
        </div>
    </div>

    <!-- 主要カード -->
    <div class="px-4 py-6">
        <div class="grid grid-cols-4 gap-3">
            <a th:href="@{/players}" class="rounded-2xl bg-white p-3 text-center shadow-md ring-1 ring-gray-100">
                <div class="text-3xl">⚾</div>
                <div class="mt-2 text-xs font-black db-brown">チーム紹介</div>
            </a>

            <a th:href="@{/schedule}" class="rounded-2xl bg-white p-3 text-center shadow-md ring-1 ring-gray-100">
                <div class="text-3xl">📅</div>
                <div class="mt-2 text-xs font-black db-brown">活動予定</div>
            </a>

            <a th:href="@{/schedule}" class="rounded-2xl bg-white p-3 text-center shadow-md ring-1 ring-gray-100">
                <div class="text-3xl">🏆</div>
                <div class="mt-2 text-xs font-black db-brown">試合結果</div>
            </a>

            <a th:href="@{/photo}" class="rounded-2xl bg-white p-3 text-center shadow-md ring-1 ring-gray-100">
                <div class="text-3xl">📷</div>
                <div class="mt-2 text-xs font-black db-brown">写真</div>
            </a>
        </div>
    </div>

    <!-- お知らせ -->
    <div class="px-4 pb-6">
        <div class="overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-100">
            <div class="flex items-center justify-between border-b border-gray-100 px-4 py-4">
                <h2 class="flex items-center gap-2 text-xl font-black db-brown">
                    <span class="db-gold">📣</span>
                    お知らせ
                </h2>
                <a th:href="@{/news}" class="text-sm font-bold db-gold">一覧を見る ＞</a>
            </div>

            <div class="divide-y divide-gray-100" th:if="${newsList != null and !newsList.isEmpty()}">
                <a th:each="news : ${newsList}"
                   th:href="@{/news/{id}(id=${news.id})}"
                   class="flex items-center gap-3 px-4 py-4">
                    <time class="w-24 shrink-0 text-sm font-bold db-gold"
                          th:text="${#temporals.format(news.publishedAt, 'yyyy.MM.dd')}">
                        2024.05.12
                    </time>
                    <p class="flex-1 text-sm font-bold text-gray-800"
                       th:text="${news.title}">
                        お知らせタイトル
                    </p>
                    <span class="text-gray-400">›</span>
                </a>
            </div>

            <div th:if="${newsList == null or newsList.isEmpty()}" class="px-4 py-6 text-sm text-gray-500">
                現在お知らせはありません。
            </div>
        </div>
    </div>

    <!-- 今日の予定 -->
    <div class="px-4 pb-6">
        <div class="overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-100">
            <div class="flex items-center justify-between border-b border-gray-100 px-4 py-4">
                <h2 class="flex items-center gap-2 text-xl font-black db-brown">
                    <span class="db-gold">📅</span>
                    今日の予定
                </h2>
                <a th:href="@{/schedule}" class="text-sm font-bold db-gold">カレンダーを見る ＞</a>
            </div>

            <div th:if="${todaySchedules != null and !todaySchedules.isEmpty()}"
                 class="divide-y divide-gray-100">

                <a th:each="s : ${todaySchedules}"
                   th:href="@{/schedule}"
                   class="block px-4 py-4">

                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <p class="text-sm font-bold db-gold"
                               th:text="${s.startTime != null ? #temporals.format(s.startTime, 'HH:mm') : '時間未定'}">
                                10:00
                            </p>

                            <h3 class="mt-1 text-base font-black db-brown"
                                th:text="${s.title}">
                                練習試合
                            </h3>

                            <p th:if="${s.location != null and !#strings.isEmpty(s.location)}"
                               class="mt-1 text-sm text-gray-600"
                               th:text="${s.location}">
                                場所
                            </p>
                        </div>

                        <span class="text-gray-400">›</span>
                    </div>
                </a>
            </div>

            <div th:if="${todaySchedules == null or todaySchedules.isEmpty()}"
                 class="px-4 py-6 text-sm text-gray-500">
                今日の予定はありません。
            </div>
        </div>
    </div>

    <!-- 写真 / Instagram 軽量表示 -->
    <div class="px-4 pb-8">
        <div class="rounded-2xl bg-white p-4 shadow-md ring-1 ring-gray-100">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="text-xl font-black db-brown">写真</h2>
                <a th:href="@{/photo}" class="text-sm font-bold db-gold">もっと見る ＞</a>
            </div>

            <div class="flex gap-3 overflow-x-auto pb-2">
                <img src="/uploads/images/group-photo.jpg"
                     onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
                     alt="写真1"
                     class="h-28 w-28 shrink-0 rounded-xl object-cover">

                <img src="/uploads/images/group-photo.jpg"
                     onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
                     alt="写真2"
                     class="h-28 w-28 shrink-0 rounded-xl object-cover">

                <img src="/uploads/images/group-photo.jpg"
                     onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
                     alt="写真3"
                     class="h-28 w-28 shrink-0 rounded-xl object-cover">

                <img src="/uploads/images/group-photo.jpg"
                     onerror="this.onerror=null; this.src='/images/default-group-photo.jpg';"
                     alt="写真4"
                     class="h-28 w-28 shrink-0 rounded-xl object-cover">
            </div>
        </div>
    </div>

</section>
</body>
</html>
