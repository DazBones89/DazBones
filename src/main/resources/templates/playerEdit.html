<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">

<body>

<section class="mt-4 text-center">
    <h2 class="text-2xl font-bold mb-4">⚾ 選手編集</h2>
</section>

<div class="max-w-md mx-auto bg-white dark:bg-gray-700 p-6 rounded shadow">

    <form th:action="@{/player/edit}" method="post" th:object="${playerForm}">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">名前</label>
            <input type="text" th:field="*{name}"
                   class="w-full border rounded px-3 py-2">
            <p class="text-red-500 text-xs"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}"></p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">ポジション</label>
            <input type="text" th:field="*{position}"
                   class="w-full border rounded px-3 py-2">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">背番号</label>
            <input type="number" th:field="*{number}"
                   class="w-full border rounded px-3 py-2">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">コメント</label>
            <textarea th:field="*{comment}"
                      class="w-full border rounded px-3 py-2"
                      rows="4"></textarea>
        </div>

        <div class="flex justify-between">
            <button type="submit"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                更新する
            </button>

            <a th:href="@{/player}"
               class="bg-gray-400 text-white px-4 py-2 rounded">
                戻る
            </a>
        </div>

    </form>
</div>

</body>
</html>
