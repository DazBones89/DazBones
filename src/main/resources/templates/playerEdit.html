<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>選手編集 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <a th:href="@{/players}" class="mb-4 inline-block text-sm font-bold db-gold">
        ＜ 選手一覧へ戻る
    </a>

    <h1 class="mb-5 text-2xl font-black db-brown">選手編集</h1>

    <form th:action="@{/players/{id}/edit(id=${player.id})}"
          th:object="${playerForm}"
          method="post"
          enctype="multipart/form-data"
          class="space-y-5 rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">

        <input type="hidden"
               th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div th:if="${errorMessage}" class="rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600">
            <span th:text="${errorMessage}"></span>
        </div>

        <div th:if="${player.imagePath != null and !#strings.isEmpty(player.imagePath)}">
            <label class="mb-1 block text-sm font-bold db-brown">現在の画像</label>
            <img th:src="${player.imagePath}" alt="現在の選手画像"
                 class="h-48 w-full rounded-xl object-cover">
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">名前 必須</label>
            <input type="text" th:field="*{name}"
                   class="w-full rounded-xl border px-4 py-3"
                   th:classappend="${#fields.hasErrors('name')} ? ' border-red-500 bg-red-50' : ''">
            <div th:if="${#fields.hasErrors('name')}" class="mt-1 text-sm font-bold text-red-500">
                <span th:errors="*{name}"></span>
            </div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">背番号</label>
            <input type="number" th:field="*{backNumber}" min="0"
                   class="w-full rounded-xl border px-4 py-3">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="mb-1 block text-sm font-bold db-brown">投げ</label>
                <select th:field="*{throwHand}" class="w-full rounded-xl border px-4 py-3">
                    <option value="">未選択</option>
                    <option value="右">右</option>
                    <option value="左">左</option>
                    <option value="両">両</option>
                </select>
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">打ち</label>
                <select th:field="*{batHand}" class="w-full rounded-xl border px-4 py-3">
                    <option value="">未選択</option>
                    <option value="右">右</option>
                    <option value="左">左</option>
                    <option value="両">両</option>
                </select>
            </div>
        </div>

        <div>
            <label class="mb-2 block text-sm font-bold db-brown">ポジション</label>
            <div class="grid grid-cols-2 gap-2 text-sm font-bold">
                <label class="rounded-xl border p-3"><input type="checkbox" th:field="*{positions}" value="投手"> 投手</label>
                <label class="rounded-xl border p-3"><input type="checkbox" th:field="*{positions}" value="捕手"> 捕手</label>
                <label class="rounded-xl border p-3"><input type="checkbox" th:field="*{positions}" value="内野手"> 内野手</label>
                <label class="rounded-xl border p-3"><input type="checkbox" th:field="*{positions}" value="外野手"> 外野手</label>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="mb-1 block text-sm font-bold db-brown">打席数</label>
                <input type="number" th:field="*{atBats}" min="0"
                       class="w-full rounded-xl border px-4 py-3"
                       th:classappend="${#fields.hasErrors('atBats')} ? ' border-red-500 bg-red-50' : ''">
                <div th:if="${#fields.hasErrors('atBats')}" class="mt-1 text-sm font-bold text-red-500">
                    <span th:errors="*{atBats}"></span>
                </div>
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">ヒット数</label>
                <input type="number" th:field="*{hits}" min="0"
                       class="w-full rounded-xl border px-4 py-3"
                       th:classappend="${#fields.hasErrors('hits')} ? ' border-red-500 bg-red-50' : ''">
                <div th:if="${#fields.hasErrors('hits')}" class="mt-1 text-sm font-bold text-red-500">
                    <span th:errors="*{hits}"></span>
                </div>
            </div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">コメント</label>
            <textarea th:field="*{comment}" rows="5"
                      class="w-full rounded-xl border px-4 py-3"></textarea>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">選手画像を変更</label>
            <input type="file" name="imageFile" accept=".jpg,.jpeg,.png,.webp"
                   class="w-full rounded-xl border px-4 py-3 text-sm">
            <p class="mt-1 text-xs text-gray-500">未選択の場合、現在の画像を維持します</p>
        </div>

        <button type="submit"
                class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
            更新する
        </button>
    </form>

</section>
</body>
</html>
