<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>選手紹介 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black db-brown">選手紹介</h1>
            <p class="mt-1 text-sm text-gray-500">DazBones メンバー一覧</p>
        </div>

        <a th:if="${userSession != null and userSession.canManage()}"
           th:href="@{/players/add}"
           class="rounded-xl px-4 py-2 text-sm font-bold text-white db-bg-brown">
            追加
        </a>
    </div>

    <!-- ソート -->
    <div class="mb-5 rounded-2xl bg-white p-4 shadow-md ring-1 ring-gray-100">
        <p class="mb-3 text-sm font-bold db-brown">並び替え</p>

        <div class="grid grid-cols-3 gap-2 text-sm font-bold">
            <a th:href="@{/players(sort='backNumber')}"
               class="rounded-xl border px-3 py-2 text-center"
               th:classappend="${sort == 'backNumber'} ? ' db-bg-gold text-white' : ''">
                背番号
            </a>

            <a th:href="@{/players(sort='position')}"
               class="rounded-xl border px-3 py-2 text-center"
               th:classappend="${sort == 'position'} ? ' db-bg-gold text-white' : ''">
                ポジション
            </a>

            <a th:href="@{/players(sort='average')}"
               class="rounded-xl border px-3 py-2 text-center"
               th:classappend="${sort == 'average'} ? ' db-bg-gold text-white' : ''">
                打率
            </a>
        </div>
    </div>

    <!-- 選手なし -->
    <div th:if="${players == null or players.isEmpty()}"
         class="rounded-2xl bg-white p-6 text-center text-sm text-gray-500 shadow-md ring-1 ring-gray-100">
        登録されている選手はいません。
    </div>

    <!-- 選手カード -->
    <div class="space-y-4" th:if="${players != null}">
        <article th:each="player : ${players}"
                 class="overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-100"
                 th:classappend="${player.deleteFlg == 1} ? ' opacity-60' : ''">

            <img th:src="${player.imagePath != null and !#strings.isEmpty(player.imagePath)} ? ${player.imagePath} : @{/images/no-image.png}"
                 alt="選手画像"
                 class="h-52 w-full object-cover">

            <div class="p-4">
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <p class="text-sm font-black db-gold"
                           th:text="${player.backNumber != null ? '#' + player.backNumber : '背番号なし'}">
                            #18
                        </p>

                        <h2 class="mt-1 text-2xl font-black db-brown"
                            th:text="${player.name}">
                            山田 太郎
                        </h2>
                    </div>

                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-500">打率</p>
                        <p class="text-2xl font-black db-brown"
                           th:text="${player.displayAverage}">
                            .321
                        </p>
                    </div>
                </div>

                <p th:if="${player.throwBatDisplay != null and !#strings.isEmpty(player.throwBatDisplay)}"
                   class="mt-2 text-sm font-bold text-gray-700"
                   th:text="${player.throwBatDisplay}">
                    右投／右打
                </p>

                <!-- ポジション -->
                <div class="mt-3 flex flex-wrap gap-2">
                    <span th:each="pos : ${player.positions}"
                          th:text="${pos.position}"
                          class="rounded-full px-3 py-1 text-xs font-black text-white"
                          th:classappend="
                            ${pos.position == '投手'} ? ' bg-red-500' :
                            (${pos.position == '捕手'} ? ' bg-blue-500' :
                            (${pos.position == '内野手'} ? ' bg-yellow-500 text-gray-900' :
                            (${pos.position == '外野手'} ? ' bg-green-500' : ' bg-gray-400')))
                          ">
                        投手
                    </span>
                </div>

                <p th:if="${player.comment != null and !#strings.isEmpty(player.comment)}"
                   class="mt-4 whitespace-pre-line rounded-xl bg-gray-50 p-3 text-sm leading-7 text-gray-700"
                   th:text="${player.comment}">
                    コメント
                </p>

                <p th:if="${player.deleteFlg == 1}"
                   class="mt-3 rounded-xl bg-red-50 px-3 py-2 text-sm font-bold text-red-600">
                    削除済み
                </p>

                <!-- 管理操作 -->
                <div th:if="${userSession != null and userSession.canManage()}"
                     class="mt-4 grid grid-cols-2 gap-2">

                    <a th:href="@{/players/{id}/edit(id=${player.id})}"
                       class="rounded-xl border px-4 py-2 text-center text-sm font-bold">
                        編集
                    </a>

                    <form th:if="${player.deleteFlg == 0}"
                          th:action="@{/players/{id}/delete(id=${player.id})}"
                          method="post"
                          onsubmit="return confirm('この選手を削除しますか？');">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                        <button type="submit"
                                class="w-full rounded-xl bg-red-500 px-4 py-2 text-sm font-bold text-white">
                            削除
                        </button>
                    </form>

                    <form th:if="${userSession != null and userSession.isAdmin() and player.deleteFlg == 1}"
                          th:action="@{/players/{id}/restore(id=${player.id})}"
                          method="post">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                        <button type="submit"
                                class="w-full rounded-xl db-bg-gold px-4 py-2 text-sm font-bold text-white">
                            復元
                        </button>
                    </form>
                </div>
            </div>
        </article>
    </div>

</section>
</body>
</html>
