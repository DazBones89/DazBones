<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>500 | DazBones</title>
</head>

<body>
<section class="px-4 py-10">

    <div class="rounded-2xl bg-white p-6 text-center shadow-md ring-1 ring-gray-100">
        <div class="text-6xl">🛠️</div>

        <h1 class="mt-4 text-3xl font-black db-brown">500</h1>

        <p class="mt-2 text-lg font-bold text-gray-700">
            システムエラーが発生しました
        </p>

        <p class="mt-4 text-sm leading-7 text-gray-500">
            処理中にエラーが発生しました。<br>
            時間をおいて再度お試しください。
        </p>

        <div th:if="${message}" class="mt-5 rounded-xl bg-gray-50 p-3 text-left text-xs text-gray-500">
            <p class="font-bold">エラー内容</p>
            <p class="mt-1 break-all" th:text="${message}">error message</p>
        </div>

        <div class="mt-6">
            <a th:href="@{/}"
               class="block rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                トップへ戻る
            </a>
        </div>
    </div>

</section>
</body>
</html>
