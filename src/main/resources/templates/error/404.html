<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>404 | DazBones</title>
</head>

<body>
<section class="px-4 py-10">

    <div class="rounded-2xl bg-white p-6 text-center shadow-md ring-1 ring-gray-100">
        <div class="text-6xl">⚾</div>

        <h1 class="mt-4 text-3xl font-black db-brown">404</h1>

        <p class="mt-2 text-lg font-bold text-gray-700">
            ページが見つかりません
        </p>

        <p class="mt-4 text-sm leading-7 text-gray-500">
            URLが間違っているか、ページが移動・削除された可能性があります。
        </p>

        <div class="mt-6 grid grid-cols-1 gap-3">
            <a th:href="@{/}"
               class="rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                トップへ戻る
            </a>

            <a th:href="@{/login}"
               class="rounded-xl border px-4 py-3 font-black db-brown">
                ログイン画面へ
            </a>
        </div>
    </div>

</section>
</body>
</html>
