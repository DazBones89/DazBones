<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>道具管理</title>
</head>

<body>
<section class="p-4">

    <h1 class="text-xl font-bold mb-4">道具管理</h1>

    <!-- 新規追加 -->
    <form th:action="@{/gear/save}" method="post" class="mb-6 space-y-2">
        <input type="text" name="name" placeholder="道具名" class="border p-2 w-full">
        <textarea name="comment" placeholder="コメント" class="border p-2 w-full"></textarea>

        <button class="bg-blue-500 text-white px-4 py-2">追加</button>
    </form>

    <!-- 一覧 -->
    <div th:each="g : ${gears}" class="border p-3 mb-3">

        <form th:action="@{/gear/save}" method="post">

            <input type="hidden" name="id" th:value="${g.id}">

            <input type="text" name="name" th:value="${g.name}" class="border p-1 w-full mb-2">

            <select name="ownerId" class="border p-1 w-full mb-2">
                <option value="">未設定</option>
                <option th:each="p : ${players}"
                        th:value="${p.id}"
                        th:text="${p.name}"
                        th:selected="${g.ownerId == p.id}">
                </option>
            </select>

            <textarea name="comment" th:text="${g.comment}" class="border p-1 w-full mb-2"></textarea>

            <button class="bg-green-500 text-white px-3 py-1">更新</button>
        </form>

        <form th:action="@{/gear/delete}" method="post"
              th:if="${userSession.isAdmin()}">
            <input type="hidden" name="id" th:value="${g.id}">
            <button class="bg-red-500 text-white px-3 py-1 mt-2">削除</button>
        </form>

    </div>

</section>
</body>
</html>
