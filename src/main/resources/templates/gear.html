<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>道具管理 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5">
        <h1 class="text-2xl font-black db-brown">道具管理</h1>
        <p class="mt-1 text-sm text-gray-500">チーム道具の所有者・コメントを管理します</p>
    </div>

    <!-- 新規追加 -->
    <div class="mb-6 rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
        <h2 class="mb-4 text-lg font-black db-brown">道具を追加</h2>

        <form th:action="@{/gear/save}" method="post" class="space-y-4">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">道具名</label>
                <input type="text"
                       name="name"
                       required
                       placeholder="例：試合球、バット、ヘルメット"
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">所有者</label>
                <select name="ownerId" class="w-full rounded-xl border px-4 py-3">
                    <option value="">未設定</option>
                    <option th:each="p : ${players}"
                            th:value="${p.id}"
                            th:text="${p.name}">
                        山田 太郎
                    </option>
                </select>
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">コメント</label>
                <textarea name="comment"
                          rows="3"
                          placeholder="保管場所・状態など"
                          class="w-full rounded-xl border px-4 py-3"></textarea>
            </div>

            <button type="submit"
                    class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                追加する
            </button>
        </form>
    </div>

    <!-- 一覧なし -->
    <div th:if="${gears == null or gears.isEmpty()}"
         class="rounded-2xl bg-white p-6 text-center text-sm text-gray-500 shadow-md ring-1 ring-gray-100">
        登録されている道具はありません。
    </div>

    <!-- 一覧 -->
    <div class="space-y-4" th:if="${gears != null and !gears.isEmpty()}">

        <article th:each="g : ${gears}"
                 class="rounded-2xl bg-white p-4 shadow-md ring-1 ring-gray-100">

            <form th:action="@{/gear/save}" method="post" class="space-y-4">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden" name="id" th:value="${g.id}">

                <div>
                    <label class="mb-1 block text-sm font-bold db-brown">道具名</label>
                    <input type="text"
                           name="name"
                           th:value="${g.name}"
                           required
                           class="w-full rounded-xl border px-4 py-3">
                </div>

                <div>
                    <label class="mb-1 block text-sm font-bold db-brown">所有者</label>
                    <select name="ownerId" class="w-full rounded-xl border px-4 py-3">
                        <option value="">未設定</option>
                        <option th:each="p : ${players}"
                                th:value="${p.id}"
                                th:text="${p.name}"
                                th:selected="${g.ownerId != null and g.ownerId == p.id}">
                            山田 太郎
                        </option>
                    </select>
                </div>

                <div>
                    <label class="mb-1 block text-sm font-bold db-brown">コメント</label>
                    <textarea name="comment"
                              rows="3"
                              class="w-full rounded-xl border px-4 py-3"
                              th:text="${g.comment}"></textarea>
                </div>

                <button type="submit"
                        class="w-full rounded-xl db-bg-gold px-4 py-3 font-black text-white">
                    更新する
                </button>
            </form>

            <form th:if="${userSession != null and userSession.isAdmin()}"
                  th:action="@{/gear/delete}"
                  method="post"
                  class="mt-3"
                  onsubmit="return confirm('この道具を削除しますか？');">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden" name="id" th:value="${g.id}">

                <button type="submit"
                        class="w-full rounded-xl bg-red-500 px-4 py-3 font-black text-white">
                    削除する
                </button>
            </form>

        </article>

    </div>

</section>
</body>
</html>
