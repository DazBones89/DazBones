<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>システム設定確認 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5">
        <h1 class="text-2xl font-black db-brown">システム設定確認</h1>
        <p class="mt-1 text-sm text-gray-500">管理者向けの確認ページです</p>
    </div>

    <div class="space-y-4">

        <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
            <h2 class="mb-3 text-lg font-black db-brown">アプリケーション</h2>

            <div class="space-y-3 text-sm">
                <div class="flex justify-between gap-3 border-b border-gray-100 pb-2">
                    <span class="font-bold text-gray-500">サイト名</span>
                    <span class="font-bold db-brown">DazBones</span>
                </div>

                <div class="flex justify-between gap-3 border-b border-gray-100 pb-2">
                    <span class="font-bold text-gray-500">表示方式</span>
                    <span class="font-bold db-brown">モバイルファースト</span>
                </div>

                <div class="flex justify-between gap-3">
                    <span class="font-bold text-gray-500">テーマ</span>
                    <span class="font-bold db-brown">ブラウン / ゴールド / ホワイト</span>
                </div>
            </div>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
            <h2 class="mb-3 text-lg font-black db-brown">運用メモ</h2>

            <ul class="space-y-2 text-sm leading-7 text-gray-700">
                <li>・画像アップロード上限は5MBです。</li>
                <li>・集合写真はJPG/JPEGのみ対応です。</li>
                <li>・アンケート、道具管理、部費管理は管理者・編集者のみ利用できます。</li>
                <li>・祝日管理、お知らせ管理、集合写真アップロードは管理者のみ利用できます。</li>
            </ul>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
            <h2 class="mb-3 text-lg font-black db-brown">管理リンク</h2>

            <div class="grid grid-cols-2 gap-3 text-sm font-bold">
                <a th:href="@{/admin/news}" class="rounded-xl border px-4 py-3 text-center">お知らせ管理</a>
                <a th:href="@{/admin/schedules}" class="rounded-xl border px-4 py-3 text-center">活動予定管理</a>
                <a th:href="@{/admin/holidays}" class="rounded-xl border px-4 py-3 text-center">祝日管理</a>
                <a th:href="@{/admin/upload/group-photo}" class="rounded-xl border px-4 py-3 text-center">集合写真</a>
            </div>
        </div>

    </div>

</section>
</body>
</html>
