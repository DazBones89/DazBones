<!-- systemInfo.html -->
<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>

<section class="max-w-2xl mx-auto mt-6 px-4">
    <h2 class="text-2xl font-bold mb-4">⚙ システム情報</h2>

    <p class="text-sm text-gray-700 dark:text-gray-300 mb-6">
        このページでは現在の設定やリンク一覧などを確認できます。
    </p>

    <div class="bg-white dark:bg-gray-700 rounded shadow p-4">
        <h3 class="font-semibold mb-2">ログイン状態</h3>
        <p class="text-sm">
            権限：
            <span th:text="${session.role} ?: '未ログイン'">未ログイン</span>
        </p>
    </div>

    <div class="mt-4 bg-white dark:bg-gray-700 rounded shadow p-4">
        <h3 class="font-semibold mb-2">操作</h3>
        <div class="space-x-2">
            <a href="/main"
               class="inline-block px-4 py-2 rounded bg-yellow-300 hover:bg-yellow-400 text-gray-900">
                メインへ戻る
            </a>
            <a href="/logout"
               th:if="${session.role} == 'admin' or ${session.role} == 'editor'"
               class="inline-block px-4 py-2 rounded bg-gray-200 hover:bg-gray-300 text-gray-900">
                ログアウト
            </a>
        </div>
    </div>
</section>

</body>
</html>
