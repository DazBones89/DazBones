<!-- layout.html -->
<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- ★各ページの <title> を差し替える -->
    <title th:replace="~{::title}">DazBones ホームページ</title>

    <script src="https://snapwidget.com/js/snapwidget.js"></script>

    <script>
        function toggleDarkMode() {
          document.documentElement.classList.toggle('dark');
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-white text-gray-900 dark:bg-gray-800 dark:text-white"
      th:fragment="layout(content)">

<!-- ===== 共通ヘッダー（ここだけにする）===== -->
<header class="text-center p-6 bg-yellow-100 dark:bg-yellow-700">
    <h1 class="text-3xl font-bold dark:text-yellow-200">DazBones 草野球チーム</h1>
    <p class="text-sm mt-1 text-gray-700 dark:text-gray-300">公式ホームページ</p>

    <!-- ロール表示 -->
    <div class="mt-2 text-sm text-gray-800 dark:text-gray-200">
        <span th:if="${session.role} == 'admin'">🔐 管理者</span>
        <span th:if="${session.role} == 'editor'">✏ 編集者</span>
    </div>

    <!-- 操作ボタン（戻る / メイン / ログイン or ログアウト / ダーク切替） -->
    <div class="mt-3 flex justify-center gap-2 flex-wrap">

        <button type="button"
                onclick="history.back()"
                class="px-3 py-1 bg-gray-300 dark:bg-gray-600 rounded">
            ← 戻る
        </button>

        <a href="/main"
           class="px-3 py-1 bg-yellow-300 rounded">
            🏠 メイン
        </a>

        <!-- 未ログインならログイン -->
        <a href="/login"
           th:if="${session.role} == null"
           class="px-3 py-1 bg-blue-300 rounded">
            ログイン
        </a>

        <!-- ログイン中ならログアウト（/logout は後でControllerで実装） -->
        <a href="/logout"
           th:if="${session.role} != null"
           class="px-3 py-1 bg-red-400 text-white rounded">
            ログアウト
        </a>

        <button type="button"
                onclick="toggleDarkMode()"
                class="px-3 py-1 bg-gray-300 dark:bg-gray-600 rounded">
            🌙 ダーク切替
        </button>
    </div>
</header>

<!-- ===== 共通ナビ（ここだけにする）===== -->
<nav class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 text-center text-sm mt-4 px-4">
    <a href="/main" class="bg-yellow-200 rounded py-2">ホーム</a>
    <a href="/player" class="bg-yellow-200 rounded py-2">選手紹介</a>
    <a href="/history" class="bg-yellow-200 rounded py-2">活動履歴</a>

    <a href="/survey" class="bg-yellow-200 rounded py-2"
       th:if="${session.role} == 'admin' or ${session.role} == 'editor'">アンケート</a>

    <a href="/gear" class="bg-yellow-200 rounded py-2"
       th:if="${session.role} == 'admin' or ${session.role} == 'editor'">道具管理</a>

    <a href="/fee" class="bg-yellow-200 rounded py-2"
       th:if="${session.role} == 'admin' or ${session.role} == 'editor'">部費管理</a>

    <a href="/admin/code" class="bg-yellow-200 rounded py-2"
       th:if="${session.role} == 'admin'">コード設定</a>

    <a href="/system" class="bg-yellow-200 rounded py-2"
       th:if="${session.role} == 'admin'">システム設定</a>

    <a href="/policy" class="bg-yellow-200 rounded py-2">ポリシー</a>
</nav>

<!-- ★各ページの中身がここに入る -->

<main class="p-4" th:insert="${content}"></main>

<footer class="mt-10 p-4 text-center text-xs text-gray-500 dark:text-gray-400">
    <p>
        © 2025 DazBones 草野球チーム |

        <!-- ログイン済みならリンク -->
        <a th:if="${session.role} != null"
           href="https://github.com/DazBones89/DazBones"
           target="_blank"
           class="underline text-blue-600 dark:text-blue-300">
            DazBones
        </a>

        <!-- 未ログインならただの文字（非活性） -->
        <span th:if="${session.role} == null"
              class="text-gray-400 cursor-not-allowed">
        DazBones
    </span>
    </p>
</footer>
</body>
</html>
