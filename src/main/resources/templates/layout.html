<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">DazBones</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --db-brown: #3b2416;
            --db-gold: #c69214;
            --db-bg: #f8f6f2;
        }

        body {
            background: var(--db-bg);
        }

        .db-safe-bottom {
            padding-bottom: 88px;
        }

        .db-brown {
            color: var(--db-brown);
        }

        .db-gold {
            color: var(--db-gold);
        }

        .db-bg-brown {
            background-color: var(--db-brown);
        }

        .db-bg-gold {
            background-color: var(--db-gold);
        }

        .db-hero-shadow {
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }
    </style>
</head>

<body class="min-h-screen text-gray-800">

<div class="mx-auto min-h-screen max-w-[480px] bg-white shadow-xl">

    <!-- ヘッダー -->
    <header class="sticky top-0 z-40 border-b border-gray-100 bg-white/95 backdrop-blur">
        <div class="flex items-center justify-between px-5 py-4">

            <a th:href="@{/}" class="text-3xl font-extrabold italic tracking-tight db-brown">
                DazBones
            </a>

            <button type="button"
                    class="flex flex-col items-center gap-1 db-brown"
                    onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                <span class="text-3xl leading-none">☰</span>
                <span class="text-xs font-bold">メニュー</span>
            </button>
        </div>

        <!-- ハンバーガーメニュー -->
        <nav id="mobileMenu" class="hidden border-t border-gray-100 bg-white px-5 py-4">

            <!-- 共通メニュー -->
            <div class="grid grid-cols-2 gap-3 text-sm font-bold">
                <a th:href="@{/}" class="rounded-xl border px-4 py-3 text-center">ホーム</a>
                <a th:href="@{/players}" class="rounded-xl border px-4 py-3 text-center">チーム紹介</a>
                <a th:href="@{/schedule}" class="rounded-xl border px-4 py-3 text-center">活動予定</a>
                <a th:href="@{/photo}" class="rounded-xl border px-4 py-3 text-center">写真</a>
                <a th:href="@{/history}" class="rounded-xl border px-4 py-3 text-center">活動履歴</a>
                <a th:href="@{/news}" class="rounded-xl border px-4 py-3 text-center">お知らせ</a>
                <a th:href="@{/policy}" class="rounded-xl border px-4 py-3 text-center">規約・ポリシー</a>

                <a th:if="${userSession == null}"
                   th:href="@{/login}"
                   class="rounded-xl border px-4 py-3 text-center">
                    ログイン
                </a>

                <a th:if="${userSession != null}"
                   th:href="@{/logout}"
                   class="rounded-xl border px-4 py-3 text-center">
                    ログアウト
                </a>
            </div>

            <!-- 編集者・管理者メニュー -->
            <div th:if="${userSession != null and userSession.canManage()}" class="mt-5">
                <p class="mb-2 text-xs font-black db-gold">管理メニュー</p>

                <div class="grid grid-cols-2 gap-3 text-sm font-bold">
                    <a th:href="@{/survey}" class="rounded-xl border px-4 py-3 text-center">アンケート管理</a>
                    <a th:href="@{/gear}" class="rounded-xl border px-4 py-3 text-center">道具管理</a>
                    <a th:href="@{/fee}" class="rounded-xl border px-4 py-3 text-center">部費管理</a>
                    <a th:href="@{/players/add}" class="rounded-xl border px-4 py-3 text-center">選手追加</a>
                </div>
            </div>

            <!-- 管理者専用メニュー -->
            <div th:if="${userSession != null and userSession.isAdmin()}" class="mt-5">
                <p class="mb-2 text-xs font-black db-gold">管理者専用</p>

                <div class="grid grid-cols-1 gap-3 text-sm font-bold">
                    <a th:href="@{/admin/news}" class="rounded-xl border px-4 py-3 text-center">お知らせ管理</a>
                    <a th:href="@{/admin/upload/group-photo}" class="rounded-xl border px-4 py-3 text-center">集合写真アップロード</a>
                    <a th:href="@{/admin/code}" class="rounded-xl border px-4 py-3 text-center">管理者コード変更</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- ページ本文 -->
    <main class="db-safe-bottom">
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- 下部固定ナビ -->
    <nav class="fixed bottom-0 left-1/2 z-50 w-full max-w-[480px] -translate-x-1/2 border-t border-gray-200 bg-white/95 backdrop-blur">
        <div class="grid grid-cols-4 text-xs font-bold">

            <a th:href="@{/}" class="flex flex-col items-center gap-1 py-3 db-gold">
                <span class="text-2xl">⌂</span>
                <span>ホーム</span>
            </a>

            <a th:href="@{/schedule}" class="flex flex-col items-center gap-1 py-3 text-gray-500">
                <span class="text-2xl">▣</span>
                <span>活動予定</span>
            </a>

            <a th:href="@{/photo}" class="flex flex-col items-center gap-1 py-3 text-gray-500">
                <span class="text-2xl">▤</span>
                <span>写真</span>
            </a>

            <a th:href="@{/login}" class="flex flex-col items-center gap-1 py-3 text-gray-500">
                <span class="text-2xl">○</span>
                <span th:text="${userSession != null ? userSession.displayName : 'ログイン'}">ログイン</span>
            </a>

        </div>
    </nav>

</div>

</body>
</html>
