<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>活動履歴 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5">
        <h1 class="text-2xl font-black db-brown">活動履歴</h1>
        <p class="mt-1 text-sm text-gray-500">過去の試合・大会・活動記録です</p>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
        <div class="mb-4 flex items-center gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-yellow-100 text-2xl">
                🏆
            </div>

            <div>
                <h2 class="text-lg font-black db-brown">活動履歴は今後追加予定です</h2>
                <p class="mt-1 text-sm text-gray-500">試合結果・大会成績をここに表示します</p>
            </div>
        </div>

        <p class="text-sm leading-7 text-gray-700">
            現時点では活動予定・試合結果ページに統合しています。
            今後、年度別・大会別の履歴管理を追加する場合は、このページを拡張します。
        </p>

        <a th:href="@{/schedule}"
           class="mt-5 block rounded-xl db-bg-brown px-4 py-3 text-center text-sm font-black text-white">
            活動予定・試合結果を見る
        </a>
    </div>

</section>
</body>
</html>
