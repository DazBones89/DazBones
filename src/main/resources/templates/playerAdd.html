<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<head>
    <title>選手追加 - DazBones</title>
</head>
<body>

<section class="mt-4 text-center">
    <h2 class="text-2xl font-bold mb-2">➕ 選手追加</h2>
    <p class="text-sm text-gray-500 dark:text-gray-300">必要項目を入力して登録します</p>
</section>

<form th:action="@{/player/add}" th:object="${playerForm}" method="post"
      class="max-w-xl mx-auto mt-6 px-4 space-y-4">

    <!-- 名前 -->
    <div>
        <label class="block text-sm font-semibold mb-1">名前（必須）</label>
        <input type="text" th:field="*{name}"
               class="w-full border rounded px-3 py-2 dark:text-black"
               placeholder="例：山田 太郎">
        <p class="text-red-600 text-xs mt-1"
           th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}">エラー</p>
    </div>

    <!-- ポジション -->
    <div>
        <label class="block text-sm font-semibold mb-1">ポジション</label>
        <input type="text" th:field="*{position}"
               class="w-full border rounded px-3 py-2 dark:text-black"
               placeholder="例：ショート">
        <p class="text-red-600 text-xs mt-1"
           th:if="${#fields.hasErrors('position')}"
           th:errors="*{position}">エラー</p>
    </div>

    <!-- 背番号 -->
    <div>
        <label class="block text-sm font-semibold mb-1">背番号（0〜99）</label>
        <input type="number" th:field="*{number}" min="0" max="99"
               class="w-full border rounded px-3 py-2 dark:text-black"
               placeholder="例：18">
        <p class="text-red-600 text-xs mt-1"
           th:if="${#fields.hasErrors('number')}"
           th:errors="*{number}">エラー</p>
    </div>

    <!-- コメント -->
    <div>
        <label class="block text-sm font-semibold mb-1">コメント</label>
        <textarea th:field="*{comment}" rows="4"
                  class="w-full border rounded px-3 py-2 dark:text-black"
                  placeholder="例：よろしくお願いします！"></textarea>
        <p class="text-red-600 text-xs mt-1"
           th:if="${#fields.hasErrors('comment')}"
           th:errors="*{comment}">エラー</p>
    </div>

    <div class="flex gap-2 justify-center pt-2">
        <button type="submit"
                class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
            登録
        </button>
        <a href="/player"
           class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
            戻る
        </a>
    </div>
</form>

</body>
</html>
