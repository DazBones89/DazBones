<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<head>
    <title>ログイン - DazBones</title>
</head>
<body>

<section class="max-w-md mx-auto mt-6 px-4">
    <h2 class="text-2xl font-bold mb-4 text-center">🔐 ログイン</h2>

    <!-- エラーメッセージ -->
    <div th:if="${errorMessage}" class="bg-red-100 text-red-800 px-4 py-2 rounded text-sm mb-3"
         th:text="${errorMessage}"></div>

    <form th:action="@{/login}" method="post" class="bg-white dark:bg-gray-700 rounded shadow p-4 space-y-3">
        <label class="block text-sm">
            IDを入力してください
            <!-- ★重要：name="code" -->
            <input type="password" name="code" autocomplete="off"
                   class="mt-1 w-full border rounded px-3 py-2 bg-white text-gray-900 placeholder-gray-400"
                   placeholder="管理者/編集者コード"
                   required>
        </label>

        <button type="submit"
                class="w-full px-4 py-2 bg-yellow-400 rounded font-semibold hover:bg-yellow-500">
            ログイン
        </button>
    </form>
</section>

</body>
</html>
