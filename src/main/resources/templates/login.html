<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>ログイン | DazBones</title>
</head>

<body>
<section class="px-4 py-10">

    <div class="mb-6 text-center">
        <h1 class="text-3xl font-black db-brown">ログイン</h1>
        <p class="mt-2 text-sm text-gray-500">管理者・編集者コードを入力してください</p>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">

        <div th:if="${successMessage}" class="mb-4 rounded-xl bg-green-50 p-3 text-sm font-bold text-green-700">
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${errorMessage}" class="mb-4 rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600">
            <span th:text="${errorMessage}"></span>
        </div>

        <div th:if="${userSession != null}" class="mb-5 rounded-xl bg-yellow-50 p-3 text-sm font-bold text-yellow-700">
            現在ログイン中です：
            <span th:text="${userSession.displayName}">管理者</span>
        </div>

        <form th:action="@{/login}"
              method="post"
              class="space-y-5">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">
                    IDを入力してください
                </label>

                <input type="password"
                       name="code"
                       required
                       autocomplete="off"
                       class="w-full rounded-xl border px-4 py-3"
                       placeholder="ログインコード">
            </div>

            <button type="submit"
                    class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                ログインする
            </button>
        </form>

        <div th:if="${userSession != null}" class="mt-4">
            <a th:href="@{/logout}"
               class="block rounded-xl border px-4 py-3 text-center font-black db-brown">
                ログアウト
            </a>
        </div>
    </div>

</section>
</body>
</html>
