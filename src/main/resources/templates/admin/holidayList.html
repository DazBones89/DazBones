<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>祝日管理 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <a th:href="@{/survey}" class="mb-4 inline-block text-sm font-bold db-gold">
        ＜ アンケートへ戻る
    </a>

    <h1 class="mb-5 text-2xl font-black db-brown">祝日管理</h1>

    <div th:if="${successMessage}" class="mb-4 rounded-xl bg-green-50 p-3 text-sm font-bold text-green-700">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="mb-4 rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="mb-6 rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
        <h2 class="mb-3 text-lg font-black db-brown">CSV一括登録</h2>

        <form th:action="@{/admin/holidays/import}"
              method="post"
              enctype="multipart/form-data"
              class="space-y-3">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input type="file"
                   name="file"
                   accept=".csv"
                   class="w-full rounded-xl border px-4 py-3 text-sm">

            <button type="submit"
                    class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
                CSVを取り込む
            </button>
        </form>

        <p class="mt-3 text-xs leading-6 text-gray-500">
            CSV形式：<br>
            2026-01-01,元日<br>
            2026-01-12,成人の日
        </p>
    </div>

    <div class="mb-6 rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">
        <h2 class="mb-3 text-lg font-black db-brown">祝日を追加</h2>

        <form th:action="@{/admin/holidays}"
              method="post"
              class="space-y-3">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">日付</label>
                <input type="date"
                       name="holidayDate"
                       required
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">祝日名</label>
                <input type="text"
                       name="name"
                       required
                       placeholder="例：元日"
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <button type="submit"
                    class="w-full rounded-xl db-bg-gold px-4 py-3 font-black text-white">
                登録する
            </button>
        </form>
    </div>

    <div class="overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-100">
        <div class="border-b border-gray-100 px-4 py-4">
            <h2 class="text-lg font-black db-brown">登録済み祝日</h2>
        </div>

        <div th:if="${holidays == null or holidays.isEmpty()}" class="px-4 py-6 text-sm text-gray-500">
            祝日はまだ登録されていません。
        </div>

        <div th:if="${holidays != null and !holidays.isEmpty()}" class="divide-y divide-gray-100">
            <div th:each="holiday : ${holidays}" class="flex items-center justify-between gap-3 px-4 py-4">

                <div>
                    <p class="text-sm font-bold db-gold"
                       th:text="${#temporals.format(holiday.holidayDate, 'yyyy.MM.dd')}">
                        2026.01.01
                    </p>
                    <p class="mt-1 text-base font-bold db-brown"
                       th:text="${holiday.name}">
                        元日
                    </p>
                </div>

                <form th:action="@{/admin/holidays/{id}/delete(id=${holiday.id})}"
                      method="post"
                      onsubmit="return confirm('この祝日を削除しますか？');">

                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <button type="submit"
                            class="rounded-xl bg-red-500 px-3 py-2 text-xs font-bold text-white">
                        削除
                    </button>
                </form>

            </div>
        </div>
    </div>

</section>
</body>
</html>
