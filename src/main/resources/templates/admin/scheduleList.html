<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<section class="px-4 py-6">

    <div class="flex justify-between mb-5">
        <h1 class="text-2xl font-black">活動予定管理</h1>
        <a href="/admin/schedules/new"
           class="px-4 py-2 bg-black text-white rounded">新規</a>
    </div>

    <div th:each="s : ${list}" class="mb-3 p-4 bg-white rounded shadow">

        <p th:text="${s.eventDate}"></p>
        <h2 th:text="${s.title}"></h2>

        <div class="flex gap-2 mt-2">
            <a th:href="@{/admin/schedules/{id}/edit(id=${s.id})}">編集</a>

            <form th:action="@{/admin/schedules/{id}/delete(id=${s.id})}" method="post">
                <button type="submit">削除</button>
            </form>
        </div>

    </div>

</section>
