<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>活動予定登録</title>
</head>

<body>

<h1>活動予定登録</h1>

<form th:action="@{/admin/schedules}"
      th:object="${scheduleForm}"
      method="post">

    <!-- タイトル -->
    <div>
        <label>タイトル</label>
        <input type="text" th:field="*{title}">

        <div th:if="${#fields.hasErrors('title')}" style="color:red;">
            <span th:errors="*{title}"></span>
        </div>
    </div>

    <!-- 日付 -->
    <div>
        <label>日付</label>
        <input type="date" th:field="*{eventDate}">

        <div th:if="${#fields.hasErrors('eventDate')}" style="color:red;">
            <span th:errors="*{eventDate}"></span>
        </div>
    </div>

    <button type="submit">保存</button>

</form>

</body>
</html>
