<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>活動予定編集 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <a th:href="@{/admin/schedules}" class="mb-4 inline-block text-sm font-bold db-gold">
        ＜ 活動予定管理へ戻る
    </a>

    <h1 class="mb-5 text-2xl font-black db-brown"
        th:text="${scheduleForm.id == null ? '活動予定新規作成' : '活動予定編集'}">
        活動予定編集
    </h1>

    <form th:action="${scheduleForm.id == null} ? @{/admin/schedules} : @{/admin/schedules/{id}/edit(id=${scheduleForm.id})}"
          th:object="${scheduleForm}"
          method="post"
          class="space-y-5 rounded-2xl bg-white p-5 shadow-md ring-1 ring-gray-100">

        <input type="hidden"
               th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">タイトル 必須</label>
            <input type="text"
                   th:field="*{title}"
                   class="w-full rounded-xl border px-4 py-3"
                   th:classappend="${#fields.hasErrors('title')} ? ' border-red-500 bg-red-50' : ''">

            <div th:if="${#fields.hasErrors('title')}" class="mt-1 text-sm font-bold text-red-500">
                <span th:errors="*{title}"></span>
            </div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">日付 必須</label>
            <input type="date"
                   th:field="*{eventDate}"
                   class="w-full rounded-xl border px-4 py-3"
                   th:classappend="${#fields.hasErrors('eventDate')} ? ' border-red-500 bg-red-50' : ''">

            <div th:if="${#fields.hasErrors('eventDate')}" class="mt-1 text-sm font-bold text-red-500">
                <span th:errors="*{eventDate}"></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="mb-1 block text-sm font-bold db-brown">開始時間</label>
                <input type="time"
                       th:field="*{startTime}"
                       class="w-full rounded-xl border px-4 py-3">
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">終了時間</label>
                <input type="time"
                       th:field="*{endTime}"
                       class="w-full rounded-xl border px-4 py-3">
            </div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">場所</label>
            <input type="text"
                   th:field="*{location}"
                   placeholder="例：〇〇グラウンド"
                   class="w-full rounded-xl border px-4 py-3">
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">対戦相手</label>
            <input type="text"
                   th:field="*{opponent}"
                   placeholder="例：サンプルズ"
                   class="w-full rounded-xl border px-4 py-3">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="mb-1 block text-sm font-bold db-brown">種別</label>
                <select th:field="*{eventType}" class="w-full rounded-xl border px-4 py-3">
                    <option value="">未設定</option>
                    <option value="練習">練習</option>
                    <option value="練習試合">練習試合</option>
                    <option value="公式戦">公式戦</option>
                    <option value="その他">その他</option>
                </select>
            </div>

            <div>
                <label class="mb-1 block text-sm font-bold db-brown">結果</label>
                <select th:field="*{resultStatus}" class="w-full rounded-xl border px-4 py-3">
                    <option value="予定">予定</option>
                    <option value="勝利">勝利</option>
                    <option value="敗北">敗北</option>
                    <option value="引分">引分</option>
                    <option value="中止">中止</option>
                </select>
            </div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">スコア</label>
            <input type="text"
                   th:field="*{score}"
                   placeholder="例：5-3"
                   class="w-full rounded-xl border px-4 py-3">
        </div>

        <div>
            <label class="mb-1 block text-sm font-bold db-brown">コメント</label>
            <textarea th:field="*{comment}"
                      rows="5"
                      placeholder="補足・集合時間など"
                      class="w-full rounded-xl border px-4 py-3"></textarea>
        </div>

        <button type="submit"
                class="w-full rounded-xl db-bg-brown px-4 py-3 font-black text-white">
            保存する
        </button>
    </form>

</section>
</body>
</html>
