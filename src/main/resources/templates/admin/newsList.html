<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>お知らせ管理 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <div class="mb-5 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black db-brown">お知らせ管理</h1>
            <p class="mt-1 text-sm text-gray-500">登録・編集・削除</p>
        </div>

        <a th:href="@{/admin/news/new}"
           class="rounded-xl px-4 py-2 text-sm font-bold text-white db-bg-brown">
            新規
        </a>
    </div>

    <div th:if="${newsList == null or newsList.isEmpty()}"
         class="rounded-2xl bg-white p-6 text-center text-sm text-gray-500 shadow-md ring-1 ring-gray-100">
        お知らせはまだ登録されていません。
    </div>

    <div class="space-y-3" th:if="${newsList != null}">
        <article th:each="news : ${newsList}"
                 class="rounded-2xl bg-white p-4 shadow-md ring-1 ring-gray-100">

            <p class="text-sm font-bold db-gold"
               th:text="${#temporals.format(news.publishedAt, 'yyyy.MM.dd HH:mm')}">
                2024.05.12 10:00
            </p>

            <h2 class="mt-1 text-lg font-black db-brown"
                th:text="${news.title}">
                お知らせタイトル
            </h2>

            <p class="mt-2 line-clamp-2 text-sm leading-6 text-gray-600"
               th:text="${news.content}">
                本文
            </p>

            <div class="mt-4 grid grid-cols-2 gap-2">
                <a th:href="@{/admin/news/{id}/edit(id=${news.id})}"
                   class="rounded-xl border px-4 py-2 text-center text-sm font-bold">
                    編集
                </a>

                <form th:action="@{/admin/news/{id}/delete(id=${news.id})}"
                      method="post"
                      onsubmit="return confirm('このお知らせを削除しますか？');">

                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <button type="submit"
                            class="w-full rounded-xl bg-red-500 px-4 py-2 text-sm font-bold text-white">
                        削除
                    </button>
                </form>
            </div>
        </article>
    </div>

</section>
</body>
</html>
