<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>お知らせ一覧 | DazBones</title>
</head>

<body>
<section class="px-4 py-6">

    <h1 class="mb-5 text-2xl font-black db-brown">お知らせ一覧</h1>

    <div th:if="${newsList == null or newsList.isEmpty()}"
         class="rounded-2xl bg-white p-6 text-center text-sm text-gray-500 shadow-md ring-1 ring-gray-100">
        現在お知らせはありません。
    </div>

    <div class="space-y-3" th:if="${newsList != null}">
        <a th:each="news : ${newsList}"
           th:href="@{/news/{id}(id=${news.id})}"
           class="block rounded-2xl bg-white p-4 shadow-md ring-1 ring-gray-100">

            <p class="text-sm font-bold db-gold"
               th:text="${#temporals.format(news.publishedAt, 'yyyy.MM.dd')}">
                2024.05.12
            </p>

            <h2 class="mt-1 text-lg font-black db-brown"
                th:text="${news.title}">
                お知らせタイトル
            </h2>

            <p class="mt-2 line-clamp-2 text-sm leading-6 text-gray-600"
               th:text="${news.content}">
                お知らせ本文
            </p>
        </a>
    </div>

</section>
</body>
</html>
