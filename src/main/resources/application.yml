server:
  port: 8080
  servlet:
    session:
      timeout: 60m
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dazbones_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: dbuser
    password: dbpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  upload-dir: uploads/images

  spring:
    jpa:
      hibernate:
        ddl-auto: none
